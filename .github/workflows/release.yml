name: "Release"

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: "PatataTube 1.0.0"
          releaseBody: |
            🥔 ¡La versión 1.0.0 de PatataTube ya está aquí! 🚀
            
            El descargador de contenido multimedia definitivo: minimalista, nativo y ridículamente rápido.
            
            **Novedades:**
            - Interfaz de usuario súper dinámica con Modo Oscuro, Claro y Poke.
            - Descarga directa en calidad máxima de Vídeo (MP4) y Audio (MP3).
            - Integración invisible de yt-dlp y ffmpeg sin dependencias adicionales.
            - Sistema de protección Anti-Playlist y Stop de emergencia instantáneo.
            
            ¡Descarga la versión para tu sistema operativo más abajo y empieza a disfrutar!
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
