<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patatatube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="content-wrapper">
        <h1 class="logo">Patatatube</h1>
        
        <div class="controls">
          <button class="icon-btn" id="audio-btn">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
          </button>
          <button class="icon-btn" id="play-btn">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </button>
        </div>

        <div class="input-wrapper">
          <input type="text" class="url-input" id="url-input" placeholder="" />
        </div>

        <div class="progress-section">
          <div style="display: flex; width: 100%; gap: 15px; align-items: center;">
          <div class="progress-bar-bg" style="flex-grow: 1; margin-bottom: 0;">
            <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
          </div>
          <button class="icon-btn" id="stop-btn" style="display: none; width: 45px; height: 45px; min-width: 45px; flex-shrink: 0; border-width: 3px;" title="Cancelar Descarga">
            <svg width="18" height="18" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="folder-btn" style="display: none; width: 45px; height: 45px; min-width: 45px; flex-shrink: 0; border-width: 3px;" title="Abrir Carpeta">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="progress-text" id="progress-text" style="margin-top: 10px;">0%</div>
        </div>

        <div class="debug-console" id="debug-console" style="display: none;">
          <div id="debug-output"></div>
        </div>
      </div>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="theme-toggle" title="Cambiar Tema">
        <svg class="theme-icon heart" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
        </svg>
        <svg class="theme-icon moon" viewBox="0 0 24 24" style="display: block;">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3z" fill="currentColor"/>
        </svg>
        <svg class="theme-icon sun" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z" fill="currentColor"/>
        </svg>
      </button>
      <span id="theme-toast" class="theme-toast">Modo oscuro</span>

      <!-- Debug Toggle -->
      <button class="terminal-toggle" id="terminal-toggle" title="Ver Consola">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
      </button>

      <!-- Easter Egg Overlay -->
      <div class="credits-overlay" id="credits-overlay">
        <div class="credits-content">
          <div class="credits-logos">
            <div class="credit-person">
              <img src="/poke.png" alt="pokeinalover" class="credit-img poke-img" />
              <p>Diseñado por<br><b>pokeinalover</b></p>
            </div>
            <div class="credit-person">
              <img src="/contra.png" alt="ContratopDev" class="credit-img contra-img" />
              <p>Programado por<br><b>ContratopDev</b></p>
            </div>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
